name: Validate Index

on:
  pull_request:
    paths:
      - "index.yaml"
  push:
    branches: [main]
    paths:
      - "index.yaml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax & schema
        run: |
          python3 -c "
          import yaml, sys
          with open('index.yaml') as f:
              data = yaml.safe_load(f)
          assert data.get('index_version') == 1, 'index_version must be 1'
          assert 'schemas' in data, 'missing schemas'
          assert 'plugins' in data, 'missing plugins'
          print(f'OK: {len(data[\"schemas\"])} schemas, {len(data[\"plugins\"])} plugins')

          for s in data['schemas']:
              assert 'id' in s and 'name' in s, f'schema missing id/name: {s}'
              if s.get('type') == 'remote':
                  assert 'downloadUrl' in s, f'schema {s[\"id\"]} missing downloadUrl'
          for p in data['plugins']:
              assert 'id' in p and 'name' in p, f'plugin missing id/name: {p}'
          "

      - name: Check remote URLs are reachable
        run: |
          python3 -c "
          import yaml, urllib.request
          with open('index.yaml') as f:
              data = yaml.safe_load(f)
          failures = 0
          for s in data.get('schemas', []):
              if s.get('type') == 'remote':
                  url = s.get('downloadUrl', '')
                  if url:
                      try:
                          code = urllib.request.urlopen(url, timeout=10).getcode()
                          print(f'  OK  {s[\"id\"]} ({code})')
                      except Exception as e:
                          print(f'  FAIL {s[\"id\"]} → {e}')
                          failures += 1
          if failures:
              sys.exit(1)
          "
