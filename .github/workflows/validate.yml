name: Validate Index

on:
  pull_request:
    paths:
      - "index.yaml"
      - "rimes/**"
      - "plugins/**"
      - "models/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - "index.yaml"
      - "rimes/**"
      - "plugins/**"
      - "models/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "pyproject.toml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      # ─── 1. 生成 + 校验 + 检查未提交变更 ────────────
      #     数据完整性校验也在这步完成
      - name: Generate and validate merged index
        run: uv run python scripts/generate_index.py --check

      # ─── 2. 校验主索引结构 ───────────────────────────
      - name: Validate main index.yaml
        run: |
          python3 -c "
          import yaml
          with open('index.yaml') as f:
              data = yaml.safe_load(f)
          assert data.get('index_version') == 1, 'index_version must be 1'
          assert 'schemas' in data and 'from' in data['schemas'], 'missing schemas.from'
          assert 'plugins' in data and 'from' in data['plugins'], 'missing plugins.from'
          assert 'models' in data and 'from' in data['models'], 'missing models.from'
          assert 'sources' in data, 'missing sources'
          print('OK: main index.yaml is valid')
          "

      # ─── 3. 检查下载链接可达性 ───────────────────────
      - name: Check remote download URLs are reachable
        run: |
          python3 -c "
          import yaml, urllib.request, sys

          def check_urls(index_path, items_key, is_model=False):
              failures = 0
              with open(index_path) as f:
                  data = yaml.safe_load(f)
              for entry in data[items_key]:
                  if entry.get('type') != 'remote':
                      continue
                  for v in entry.get('versions', []):
                      if is_model:
                          # models: check archive.url + files[*].url
                          if 'archive' in v:
                              url = v['archive'].get('url', '')
                              if url:
                                  try:
                                      code = urllib.request.urlopen(url, timeout=10).getcode()
                                      print('  OK  {} {} archive ({})'.format(entry['id'], v['version'], code))
                                  except Exception as e:
                                      print('  FAIL {} {} archive → {}'.format(entry['id'], v['version'], e))
                                      failures += 1
                          for f in v.get('files', []):
                              url = f.get('url', '')
                              if url:
                                  try:
                                      code = urllib.request.urlopen(url, timeout=10).getcode()
                                      print('  OK  {} {} {} ({})'.format(entry['id'], v['version'], f['name'], code))
                                  except Exception as e:
                                      print('  FAIL {} {} {} → {}'.format(entry['id'], v['version'], f['name'], e))
                                      failures += 1
                      else:
                          for item in v.get('downloadUrl', []):
                              url = item.get('url', '')
                              if url:
                                  try:
                                      code = urllib.request.urlopen(url, timeout=10).getcode()
                                      print('  OK  {} {} ({})'.format(entry['id'], v['version'], code))
                                  except Exception as e:
                                      print('  FAIL {} {} → {}'.format(entry['id'], v['version'], e))
                                      failures += 1
              return failures

          failures = check_urls('rimes/index.yaml', 'schemas')
          failures += check_urls('plugins/index.yaml', 'plugins')
          failures += check_urls('models/index.yaml', 'models', is_model=True)

          if failures:
              sys.exit(1)
          print('All remote URLs are reachable')
          "
