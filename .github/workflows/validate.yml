name: Validate Index

on:
  pull_request:
    paths:
      - "index.yaml"
      - "rimes/**"
      - "plugins/**"
  push:
    branches: [main]
    paths:
      - "index.yaml"
      - "rimes/**"
      - "plugins/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate main index.yaml
        run: |
          python3 -c "
          import yaml, sys
          with open('index.yaml') as f:
              data = yaml.safe_load(f)
          assert data.get('index_version') == 1, 'index_version must be 1'
          assert 'schemas' in data and 'from' in data['schemas'], 'missing schemas.from'
          assert 'plugins' in data and 'from' in data['plugins'], 'missing plugins.from'
          assert 'sources' in data, 'missing sources'
          print(f'OK: main index.yaml is valid')
          "

      - name: Validate rimes/index.yaml sub-index
        run: |
          python3 -c "
          import yaml, sys, os
          with open('rimes/index.yaml') as f:
              data = yaml.safe_load(f)
          assert data.get('index_version') == 1, 'rimes/index.yaml: index_version must be 1'
          assert 'schemas' in data, 'rimes/index.yaml: missing schemas'
          refs = data['schemas']
          print(f'  rimes/index.yaml: {len(refs)} schema references')

          for ref in refs:
              fpath = ref['file']
              assert 'version' in ref, f'missing version for {fpath}'
              full = os.path.normpath(os.path.join('rimes', fpath))
              assert os.path.exists(full), f'referenced file not found: {full}'
              # validate the referenced file
              with open(full) as sf:
                  s = yaml.safe_load(sf)
              assert 'id' in s, f'{full}: missing id'
              # check that id matches filename
              basename = os.path.splitext(os.path.basename(full))[0]
              assert s['id'] == basename, f'{full}: id "{s["id"]}" does not match filename "{basename}"'
              assert 'name' in s, f'{full}: missing name'
              assert 'currentVersion' in s, f'{full}: missing currentVersion'
              assert 'versions' in s, f'{full}: missing versions'
              # version in index matches currentVersion
              assert str(ref['version']) == str(s['currentVersion']), \
                  f'{full}: index version {ref[\"version\"]} != currentVersion {s[\"currentVersion\"]}'
              # check each version entry
              for v in s['versions']:
                  assert 'version' in v, f'{full}: version entry missing version'
                  assert 'date' in v, f'{full}: version {v[\"version\"]} missing date'
                  if s.get('type') == 'remote':
                      dl = v.get('downloadUrl')
                      assert dl, f'{full}: version {v["version"]} missing downloadUrl'
                      assert isinstance(dl, list), f'{full}: version {v["version"]} downloadUrl must be a list'
                      assert len(dl) > 0, f'{full}: version {v["version"]} downloadUrl is empty'
                      for i, item in enumerate(dl):
                          assert isinstance(item, dict), f'{full}: version {v["version"]} downloadUrl[{i}] must be an object'
                          assert 'url' in item, f'{full}: version {v["version"]} downloadUrl[{i}] missing url'
              print(f'  OK  {s[\"id\"]} v{s[\"currentVersion\"]}')
          "

      - name: Validate plugins/index.yaml sub-index
        run: |
          python3 -c "
          import yaml, sys, os
          with open('plugins/index.yaml') as f:
              data = yaml.safe_load(f)
          assert data.get('index_version') == 1, 'plugins/index.yaml: index_version must be 1'
          assert 'plugins' in data, 'plugins/index.yaml: missing plugins'
          refs = data['plugins']
          print(f'  plugins/index.yaml: {len(refs)} plugin references')

          for ref in refs:
              fpath = ref['file']
              assert 'version' in ref, f'missing version for {fpath}'
              full = os.path.normpath(os.path.join('plugins', fpath))
              assert os.path.exists(full), f'referenced file not found: {full}'
              with open(full) as pf:
                  p = yaml.safe_load(pf)
              assert 'id' in p, f'{full}: missing id'
              # check that id matches filename
              basename = os.path.splitext(os.path.basename(full))[0]
              assert p['id'] == basename, f'{full}: id "{p["id"]}" does not match filename "{basename}"'
              assert 'name' in p, f'{full}: missing name'
              assert 'pluginType' in p, f'{full}: missing pluginType'
              assert 'currentVersion' in p, f'{full}: missing currentVersion'
              assert 'versions' in p, f'{full}: missing versions'
              assert str(ref['version']) == str(p['currentVersion']), \
                  f'{full}: index version {ref[\"version\"]} != currentVersion {p[\"currentVersion\"]}'
              for v in p['versions']:
                  assert 'version' in v, f'{full}: version entry missing version'
                  assert 'date' in v, f'{full}: version {v[\"version\"]} missing date'
                  assert 'downloadUrl' in v, f'{full}: version {v[\"version\"]} missing downloadUrl'
                  dl = v['downloadUrl']
                  assert isinstance(dl, list), f'{full}: version {v["version"]} downloadUrl must be a list'
                  assert len(dl) > 0, f'{full}: version {v["version"]} downloadUrl is empty'
                  for i, item in enumerate(dl):
                      assert isinstance(item, dict), f'{full}: version {v["version"]} downloadUrl[{i}] must be an object'
                      assert 'url' in item, f'{full}: version {v["version"]} downloadUrl[{i}] missing url'
              print(f'  OK  {p[\"id\"]} v{p[\"currentVersion\"]}')
          "

      - name: Check remote download URLs are reachable
        run: |
          python3 -c "
          import yaml, urllib.request, sys, os
          failures = 0

          def check_urls(index_path, items_key, file_key):
              with open(index_path) as f:
                  data = yaml.safe_load(f)
              for ref in data[items_key]:
                  fpath = os.path.normpath(os.path.join(os.path.dirname(index_path), ref['file']))
                  with open(fpath) as ef:
                      entry = yaml.safe_load(ef)
                  if entry.get('type') != 'remote':
                      continue
                  for v in entry.get('versions', []):
                      dl = v.get('downloadUrl', [])
                      urls = [item['url'] for item in dl if isinstance(item, dict) and 'url' in item]
                      for url in urls:
                          if url:
                              try:
                                  code = urllib.request.urlopen(url, timeout=10).getcode()
                                  print(f'  OK  {entry[\"id\"]} v{v[\"version\"]} ({code})')
                              except Exception as e:
                                  print(f'  FAIL {entry[\"id\"]} v{v[\"version\"]} → {e}')
                                  failures += 1

          check_urls('rimes/index.yaml', 'schemas', 'file')
          check_urls('plugins/index.yaml', 'plugins', 'file')

          if failures:
              sys.exit(1)
          print('All remote URLs are reachable')
          "
