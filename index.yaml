  - id: "xime.kaomoji"
    name: "颜文字"
    version: "2.0.0"
    author: "Xime"
    description: "丰富的颜文字表情集，(◕‿◕✿) 让输入更有趣"
    type: "built-in"
    tags: ["颜文字", "表情"]
    pluginType: "emoji"
    appVersion: ">=2.0.0"

  - id: "xime.meme-bunny"
    name: "表情兔"
    version: "2.0.0"
    author: "Xime"
    description: "可爱的表情包贴纸合集"
    type: "built-in"
    tags: ["表情包", "贴纸"]
    pluginType: "emoji"
    appVersion: ">=2.0.0"

